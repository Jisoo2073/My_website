<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title> Jisoo's Daily Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="window">

    <div class="window-header">
        <div class="buttons">
            <span class="red"></span>
            <span class="yellow"></span>
            <span class="green"></span>
        </div>
        <div class="title">Jisoo's Dashboard</div>
    </div>

    <div class="content">

        <!-- LEFT SIDE -->
        <div class="main-area">

            <h1>📚 My Daily Dashboard</h1>

            <div class="container">
                <a class="card" href="https://my.purdue.edu" target="_blank">🎓 MyPurdue</a>
                <a class="card" href="https://brightspace.purdue.edu" target="_blank">📘 Brightspace</a>
                <a class="card" href="https://docs.google.com/spreadsheets/d/11IV6jAOJHWAXL-6N2hKe9hIEz4IyvotcG4IwVOLGvEQ/edit?gid=0#gid=0" target="_blank">📅 HW Schedule</a>
                <a class="card" href="https://docs.google.com/spreadsheets/d/1vIp7OUh85XX3-F8-CAP_wjHPy9CkYz9NjXz7WlTRtMI/edit?gid=0#gid=0" target="_blank">💼 Job Applications</a>
            </div>

        </div>

        <!-- RIGHT SIDE WIDGETS -->
        <div class="widget-panel">

            <!-- WORLD CLOCK -->
            <div class="widget">
                <h3>⏰ World Clock</h3>

                <div class="clock-item">
                    🇺🇸 Indianapolis
                    <div id="indy-time" class="time"></div>
                </div>

                <div class="clock-item">
                    🇹🇷 Istanbul
                    <div id="istanbul-time" class="time"></div>
                </div>
            </div>

            <!-- WEATHER -->
            <div class="widget">
                <h3>🌤 Indianapolis Weather</h3>
                <div id="weather">
                    Loading...
                </div>
            </div>

            <!-- SPOTIFY -->
            <div class="widget">
                <h3>🎵 Spotify</h3>
                <iframe style="border-radius:12px"
                    src="https://open.spotify.com/embed/playlist/37i9dQZF1DXcBWIGoYBM5M"
                    width="100%"
                    height="152"
                    frameBorder="0"
                    allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
                </iframe>
            </div>

        </div>

    </div>
</div>

<!-- CLOCK SCRIPT -->
<script>
function updateClocks() {
    const now = new Date();

    const indyOptions = {
        timeZone: "America/Indiana/Indianapolis",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: true
    };

    const istanbulOptions = {
        timeZone: "Europe/Istanbul",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: true
    };

    document.getElementById("indy-time").innerText =
        new Intl.DateTimeFormat("en-US", indyOptions).format(now);

    document.getElementById("istanbul-time").innerText =
        new Intl.DateTimeFormat("en-US", istanbulOptions).format(now);
}

async function loadWeather() {
    const response = await fetch(
        "https://api.open-meteo.com/v1/forecast?latitude=39.77&longitude=-86.16&current_weather=true"
    );
    const data = await response.json();
    const temp = data.current_weather.temperature;
    const wind = data.current_weather.windspeed;

    document.getElementById("weather").innerHTML =
        `<div style="font-size:22px; font-weight:600;">${temp}°C</div>
         <div>Wind: ${wind} km/h</div>`;
}

setInterval(updateClocks, 1000);
updateClocks();
loadWeather();
</script>

</body>
</html>
