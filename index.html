<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jisoo Daily Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 🔹 메인 대시보드 -->
<div class="window draggable resizable" id="mainBoard">

    <div class="window-header drag-handle">
        <div class="buttons">
            <span class="red"></span>
            <span class="yellow"></span>
            <span class="green"></span>
        </div>
        <div class="title">Jisoo Mainboard</div>
    </div>

    <div class="content">
        <h1>My Daily Dashboard</h1>

        <div class="container">
            <a class="card" href="https://my.purdue.edu" target="_blank">MyPurdue</a>
            <a class="card" href="https://brightspace.purdue.edu" target="_blank">Brightspace</a>
        </div>

        <div class="clock-container">
            <div>
                <h3>Indianapolis</h3>
                <div id="indyClock"></div>
            </div>
            <div>
                <h3>Istanbul</h3>
                <div id="istanbulClock"></div>
            </div>
        </div>
    </div>
</div>

<!-- 🔹 Spotify 위젯 (크기조절 가능) -->
<div class="floating-widget draggable resizable" style="top:450px; right:80px; width:300px; height:200px;">
    <div class="drag-handle widget-header">Spotify</div>
    <iframe style="border-radius:12px; width:100%; height:100%;"
        src="https://open.spotify.com/embed/playlist/37i9dQZF1DXcBWIGoYBM5M"
        frameBorder="0"
        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
    </iframe>
</div>

<!-- 🔹 Dock -->
<div class="dock">
    <span>Opacity</span>
    <input type="range" min="0.3" max="1" step="0.1" value="0.9" id="opacityControl">
</div>

<script src="script.js"></script>
</body>
</html>
